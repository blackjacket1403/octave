<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>html,body{margin:0;width:1024px;height:1024px;overflow:hidden;background:#000}</style>
</head>
<body>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="46%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#161a30"/>
      <stop offset="55%" stop-color="#0c0e1c"/>
      <stop offset="100%" stop-color="#06070d"/>
    </radialGradient>
    <radialGradient id="head" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e8" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#f1e6c8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f1e6c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="corona" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c98a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e8c98a" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur18"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="blur7"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="1.6"/></filter>
    <clipPath id="disc"><circle cx="512" cy="512" r="512"/></clipPath>
  </defs>

  <g clip-path="url(#disc)">
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- starfield -->
    <g fill="#cdd5e6">
      <circle cx="150" cy="180" r="2.5" opacity="0.55"/><circle cx="260" cy="120" r="1.8" opacity="0.4"/>
      <circle cx="420" cy="90"  r="2.2" opacity="0.5"/><circle cx="610" cy="140" r="1.6" opacity="0.45"/>
      <circle cx="760" cy="100" r="2.6" opacity="0.5"/><circle cx="880" cy="220" r="1.8" opacity="0.4"/>
      <circle cx="930" cy="430" r="2.2" opacity="0.45"/><circle cx="120" cy="420" r="1.7" opacity="0.4"/>
      <circle cx="90"  cy="640" r="2.4" opacity="0.45"/><circle cx="210" cy="880" r="2.0" opacity="0.4"/>
      <circle cx="500" cy="950" r="2.4" opacity="0.5"/><circle cx="740" cy="900" r="1.8" opacity="0.45"/>
      <circle cx="900" cy="760" r="2.3" opacity="0.5"/><circle cx="340" cy="240" r="1.4" opacity="0.35"/>
      <circle cx="560" cy="320" r="1.5" opacity="0.35"/><circle cx="700" cy="380" r="1.4" opacity="0.3"/>
      <circle cx="180" cy="300" r="1.3" opacity="0.3"/><circle cx="820" cy="560" r="1.5" opacity="0.35"/>
      <circle cx="640" cy="820" r="1.6" opacity="0.4"/><circle cx="380" cy="860" r="1.4" opacity="0.35"/>
    </g>

    <!-- spiked stars -->
    <g fill="#e8d9b0">
      <path d="M780 180 l4 26 26 4 -26 4 -4 26 -4 -26 -26 -4 26 -4 z" opacity="0.85"/>
      <path d="M200 720 l3 20 20 3 -20 3 -3 20 -3 -20 -20 -3 20 -3 z" fill="#aec6e2" opacity="0.8"/>
      <path d="M870 640 l2.5 16 16 2.5 -16 2.5 -2.5 16 -2.5 -16 -16 -2.5 16 -2.5 z" opacity="0.6"/>
    </g>

    <!-- the five voice ribbons: bass low and amber, brilliance high and silver -->
    <!-- each = glow stroke + body stroke + bright core -->
    <g fill="none" stroke-linecap="round">
      <!-- bass : amber -->
      <path d="M-60 850 C 220 840, 330 700, 512 690 S 830 600, 1090 480" stroke="#a86a24" stroke-width="58" opacity="0.30" filter="url(#blur18)"/>
      <path d="M-60 850 C 220 840, 330 700, 512 690 S 830 600, 1090 480" stroke="#b97f33" stroke-width="20" opacity="0.85" filter="url(#blur2)"/>

      <!-- tenor : warm gold, dips under alto -->
      <path d="M-60 700 C 240 740, 380 600, 540 612 S 850 480, 1090 400" stroke="#cf9a45" stroke-width="52" opacity="0.3" filter="url(#blur18)"/>
      <path d="M-60 700 C 240 740, 380 600, 540 612 S 850 480, 1090 400" stroke="#d8a958" stroke-width="16" opacity="0.9" filter="url(#blur2)"/>

      <!-- alto : candle gold -->
      <path d="M-60 600 C 260 560, 360 520, 530 540 S 820 420, 1090 300" stroke="#e6c378" stroke-width="44" opacity="0.32" filter="url(#blur18)"/>
      <path d="M-60 600 C 260 560, 360 520, 530 540 S 820 420, 1090 300" stroke="#eccf8d" stroke-width="13" opacity="0.95" filter="url(#blur2)"/>

      <!-- soprano : ivory, the salient voice — brightest, weaving over -->
      <path d="M-60 470 C 230 520, 400 430, 560 450 S 840 330, 1060 220" stroke="#f1e6c8" stroke-width="48" opacity="0.4" filter="url(#blur18)"/>
      <path d="M-60 470 C 230 520, 400 430, 560 450 S 840 330, 1060 220" stroke="#f7efd9" stroke-width="13" opacity="1" filter="url(#blur2)"/>

      <!-- brilliance : silver-blue, finest thread -->
      <path d="M-60 360 C 250 330, 420 360, 580 330 S 850 240, 1080 150" stroke="#aec6e2" stroke-width="34" opacity="0.34" filter="url(#blur18)"/>
      <path d="M-60 360 C 250 330, 420 360, 580 330 S 850 240, 1080 150" stroke="#c2d4ea" stroke-width="9" opacity="0.95" filter="url(#blur2)"/>
    </g>

    <!-- the soprano ribbon's comet head -->
    <circle cx="935" cy="282" r="150" fill="url(#corona)"/>
    <circle cx="935" cy="282" r="84" fill="url(#head)"/>
    <circle cx="935" cy="282" r="10" fill="#fffdf4"/>
    <path d="M935 222 l7 50 50 10 -50 10 -7 50 -7 -50 -50 -10 50 -10 z" fill="#fff6dd" opacity="0.9" filter="url(#blur2)"/>

    <!-- vignette -->
    <circle cx="512" cy="512" r="512" fill="none" stroke="#04050a" stroke-width="110" opacity="0.55" filter="url(#blur18)"/>
  </g>

  <!-- gilded ring -->
  <circle cx="512" cy="512" r="492" fill="none" stroke="#d8b46a" stroke-width="5" opacity="0.75"/>
  <circle cx="512" cy="512" r="470" fill="none" stroke="#d8b46a" stroke-width="1.5" opacity="0.3"/>
</svg>
</body>
</html>
