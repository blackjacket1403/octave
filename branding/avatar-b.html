<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500&display=swap" rel="stylesheet" />
<style>html,body{margin:0;width:1024px;height:1024px;overflow:hidden;background:#000}</style>
</head>
<body>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#151830"/>
      <stop offset="55%" stop-color="#0b0d1a"/>
      <stop offset="100%" stop-color="#06070d"/>
    </radialGradient>
    <linearGradient id="ribbon" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a86a24"/>
      <stop offset="30%" stop-color="#cf9a45"/>
      <stop offset="55%" stop-color="#e6c378"/>
      <stop offset="78%" stop-color="#f1e6c8"/>
      <stop offset="100%" stop-color="#aec6e2"/>
    </linearGradient>
    <filter id="blur16"><feGaussianBlur stdDeviation="16"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="1.6"/></filter>
    <clipPath id="disc"><circle cx="512" cy="512" r="512"/></clipPath>
  </defs>

  <g clip-path="url(#disc)">
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <g fill="#cdd5e6">
      <circle cx="180" cy="200" r="2.2" opacity="0.5"/><circle cx="350" cy="120" r="1.7" opacity="0.4"/>
      <circle cx="640" cy="110" r="2.4" opacity="0.5"/><circle cx="840" cy="240" r="1.8" opacity="0.4"/>
      <circle cx="920" cy="520" r="2.2" opacity="0.45"/><circle cx="120" cy="520" r="1.8" opacity="0.4"/>
      <circle cx="200" cy="840" r="2.2" opacity="0.45"/><circle cx="700" cy="910" r="2.0" opacity="0.45"/>
      <circle cx="860" cy="780" r="1.7" opacity="0.4"/><circle cx="470" cy="950" r="1.8" opacity="0.4"/>
    </g>
    <path d="M820 160 l3.5 24 24 3.5 -24 3.5 -3.5 24 -3.5 -24 -24 -3.5 24 -3.5 z" fill="#e8d9b0" opacity="0.85"/>
    <path d="M170 700 l3 18 18 3 -18 3 -3 18 -3 -18 -18 -3 18 -3 z" fill="#aec6e2" opacity="0.75"/>

    <!-- one ribbon of all five voices, sweeping through the letter -->
    <g fill="none" stroke="url(#ribbon)" stroke-linecap="round">
      <path d="M-80 770 C 200 820, 330 640, 470 600 S 700 480, 800 360 S 980 220, 1100 190"
            stroke-width="64" opacity="0.30" filter="url(#blur16)"/>
      <path d="M-80 770 C 200 820, 330 640, 470 600 S 700 480, 800 360 S 980 220, 1100 190"
            stroke-width="18" opacity="0.95" filter="url(#blur2)"/>
    </g>

    <!-- the letter -->
    <text x="500" y="648" text-anchor="middle"
          font-family="'Cormorant Garamond', Georgia, serif" font-style="italic" font-weight="500"
          font-size="560" fill="#ece4d0" opacity="0.96">O</text>

    <!-- ribbon passes in front of the letter's lower bowl -->
    <g fill="none" stroke="url(#ribbon)" stroke-linecap="round">
      <path d="M300 668 C 380 640, 430 620, 470 600" stroke-width="18" opacity="0.95" filter="url(#blur2)"/>
      <path d="M620 520 C 680 488, 740 430, 800 360" stroke-width="18" opacity="0.95" filter="url(#blur2)"/>
    </g>

    <circle cx="512" cy="512" r="512" fill="none" stroke="#04050a" stroke-width="110" opacity="0.5" filter="url(#blur16)"/>
  </g>

  <circle cx="512" cy="512" r="492" fill="none" stroke="#d8b46a" stroke-width="5" opacity="0.75"/>
  <circle cx="512" cy="512" r="470" fill="none" stroke="#d8b46a" stroke-width="1.5" opacity="0.3"/>
</svg>
</body>
</html>
