<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inside the Orchestra</title>
    <meta name="description" content="An immersive visual world driven by classical music. Drop in a recording and stand at the podium." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Jost:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='7' fill='%23d8b46a'/><circle cx='16' cy='16' r='13' fill='none' stroke='%23d8b46a' stroke-opacity='.35' stroke-width='1.5'/></svg>" />
    <style>
      :root {
        --ivory: #e8e2d4;
        --ivory-dim: rgba(232, 226, 212, 0.55);
        --ivory-faint: rgba(232, 226, 212, 0.28);
        --gold: #d8b46a;
        --charcoal: #0a0b10;
        --panel: rgba(14, 15, 22, 0.72);
        --hairline: rgba(232, 226, 212, 0.14);
        --serif: 'Cormorant Garamond', 'Georgia', serif;
        --sans: 'Jost', 'Avenir', sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; background: var(--charcoal); }
      body {
        font-family: var(--sans);
        color: var(--ivory);
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }
      #stage { position: fixed; inset: 0; display: block; }
      canvas { display: block; }

      /* ---------- shared ---------- */
      button {
        font-family: var(--sans);
        background: none;
        border: none;
        color: var(--ivory-dim);
        cursor: pointer;
        transition: color 0.35s ease;
      }
      button:hover { color: var(--ivory); }
      .smallcaps {
        text-transform: uppercase;
        letter-spacing: 0.22em;
        font-weight: 300;
        font-size: 11px;
      }

      /* ---------- landing ---------- */
      #landing {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 0;
        z-index: 20;
        background: radial-gradient(ellipse 90% 65% at 50% 38%, rgba(26, 28, 44, 0.42), rgba(10, 11, 16, 0.55) 70%);
        transition: opacity 1.6s ease, visibility 1.6s;
        text-align: center;
        padding: 24px;
      }
      #landing.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      .landing-rule {
        width: 1px; height: 64px;
        background: linear-gradient(to bottom, transparent, var(--gold));
        opacity: 0.7;
        margin-bottom: 26px;
        animation: ruleGrow 2.2s ease both;
      }
      @keyframes ruleGrow { from { height: 0; opacity: 0; } to { height: 64px; opacity: 0.7; } }
      #landing h1 {
        font-family: var(--serif);
        font-weight: 300;
        font-size: clamp(42px, 7.5vw, 96px);
        line-height: 1.02;
        letter-spacing: 0.04em;
        color: var(--ivory);
        animation: fadeUp 1.8s 0.25s ease both;
      }
      #landing h1 em {
        font-style: italic;
        font-weight: 400;
        color: var(--gold);
      }
      #landing .tagline {
        font-family: var(--serif);
        font-style: italic;
        font-size: clamp(16px, 2vw, 21px);
        color: var(--ivory-dim);
        margin-top: 18px;
        max-width: 46ch;
        animation: fadeUp 1.8s 0.5s ease both;
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to { opacity: 1; transform: none; }
      }
      #dropzone {
        margin-top: 52px;
        padding: 26px 54px;
        border: 1px solid var(--hairline);
        position: relative;
        cursor: pointer;
        transition: border-color 0.4s ease, background 0.4s ease;
        animation: fadeUp 1.8s 0.75s ease both;
      }
      #dropzone::before, #dropzone::after {
        content: '';
        position: absolute; width: 14px; height: 14px;
        border: 1px solid var(--gold);
        opacity: 0.65;
        transition: all 0.4s ease;
      }
      #dropzone::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
      #dropzone::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }
      #dropzone:hover, #dropzone.dragover {
        border-color: rgba(216, 180, 106, 0.45);
        background: rgba(216, 180, 106, 0.04);
      }
      #dropzone:hover::before, #dropzone:hover::after,
      #dropzone.dragover::before, #dropzone.dragover::after {
        width: 22px; height: 22px; opacity: 1;
      }
      #dropzone .dz-main {
        font-family: var(--serif);
        font-size: 22px;
        font-weight: 400;
        color: var(--ivory);
      }
      #dropzone .dz-sub {
        margin-top: 8px;
        font-size: 10px;
        color: var(--ivory-faint);
      }
      #demoBtn {
        margin-top: 30px;
        padding: 10px 6px;
        color: var(--ivory-dim);
        border-bottom: 1px solid transparent;
        animation: fadeUp 1.8s 0.95s ease both;
        transition: color 0.35s ease, border-color 0.35s ease;
      }
      #demoBtn:hover { color: var(--gold); border-color: rgba(216, 180, 106, 0.4); }
      #landing .privacy {
        position: absolute;
        bottom: 26px;
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(232, 226, 212, 0.22);
        animation: fadeUp 1.8s 1.2s ease both;
      }

      /* drag-over veil for whole window during playback */
      #dragveil {
        position: fixed; inset: 0; z-index: 40;
        display: none;
        align-items: center; justify-content: center;
        background: rgba(10, 11, 16, 0.72);
        border: 1px solid rgba(216, 180, 106, 0.35);
        outline: 1px solid rgba(216, 180, 106, 0.35);
        outline-offset: -14px;
        font-family: var(--serif);
        font-size: 26px;
        font-style: italic;
        color: var(--gold);
        pointer-events: none;
      }
      #dragveil.active { display: flex; }

      /* ---------- transport ---------- */
      #transport {
        position: fixed;
        left: 50%; bottom: 28px;
        transform: translateX(-50%);
        width: min(860px, calc(100vw - 48px));
        z-index: 30;
        background: var(--panel);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid var(--hairline);
        padding: 14px 22px 12px;
        display: flex;
        flex-direction: column;
        gap: 9px;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.8s ease, visibility 0.8s, transform 0.8s ease;
      }
      #transport.visible { opacity: 1; visibility: visible; }
      body.ui-idle #transport.visible {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
        pointer-events: none;
      }
      body.ui-idle { cursor: none; }
      #transport .row {
        display: flex; align-items: center; gap: 18px;
      }
      #playBtn {
        width: 34px; height: 34px;
        display: flex; align-items: center; justify-content: center;
        color: var(--ivory);
        flex: 0 0 auto;
      }
      #playBtn svg { width: 15px; height: 15px; fill: currentColor; }
      #playBtn:hover { color: var(--gold); }
      .timecode {
        font-size: 11px;
        letter-spacing: 0.14em;
        color: var(--ivory-dim);
        font-variant-numeric: tabular-nums;
        flex: 0 0 auto;
        min-width: 44px;
      }
      #seek {
        flex: 1;
        height: 22px;
        display: flex; align-items: center;
        cursor: pointer;
      }
      #seek .track {
        position: relative;
        width: 100%; height: 1px;
        background: rgba(232, 226, 212, 0.18);
      }
      #seek .fill {
        position: absolute; left: 0; top: 0; bottom: 0;
        width: 0%;
        background: var(--gold);
        box-shadow: 0 0 8px rgba(216, 180, 106, 0.55);
      }
      #seek .knob {
        position: absolute;
        top: 50%; left: 0%;
        width: 9px; height: 9px;
        transform: translate(-50%, -50%) rotate(45deg);
        background: var(--gold);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      #seek:hover .knob { opacity: 1; }
      #trackName {
        font-family: var(--serif);
        font-style: italic;
        font-size: 15px;
        color: var(--ivory-dim);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        flex: 1;
        min-width: 0;
      }
      .t-controls { display: flex; align-items: center; gap: 16px; flex: 0 0 auto; }
      .t-controls button { display: flex; align-items: center; }
      .t-controls svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.3; }
      #vol {
        -webkit-appearance: none; appearance: none;
        width: 72px; height: 1px;
        background: rgba(232, 226, 212, 0.25);
        outline: none;
        cursor: pointer;
      }
      #vol::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 8px; height: 8px;
        background: var(--ivory-dim);
        transform: rotate(45deg);
        transition: background 0.3s;
      }
      #vol:hover::-webkit-slider-thumb { background: var(--gold); }
      #vol::-moz-range-thumb {
        width: 8px; height: 8px; border: none; border-radius: 0;
        background: var(--ivory-dim);
        transform: rotate(45deg);
      }
      #modeSelect {
        font-family: var(--sans);
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        background: transparent;
        color: var(--ivory-dim);
        border: none;
        outline: none;
        cursor: pointer;
        text-align: right;
      }
      #modeSelect option { background: #14151d; color: var(--ivory); }

      /* ---------- dev overlay ---------- */
      #devOverlay {
        position: fixed; top: 18px; left: 18px; z-index: 60;
        display: none;
        font-family: monospace;
        font-size: 11px;
        line-height: 1.5;
        color: #9ecf9e;
        background: rgba(0, 0, 0, 0.6);
        padding: 12px 14px;
        white-space: pre;
        pointer-events: none;
      }
      #devOverlay.visible { display: block; }

      /* ---------- toast ---------- */
      #toast {
        position: fixed; top: 32px; left: 50%;
        transform: translateX(-50%);
        z-index: 70;
        font-family: var(--serif);
        font-style: italic;
        font-size: 16px;
        color: var(--ivory);
        background: var(--panel);
        border: 1px solid var(--hairline);
        padding: 10px 26px;
        opacity: 0;
        transition: opacity 0.5s ease;
        pointer-events: none;
      }
      #toast.visible { opacity: 1; }

      @media (max-width: 640px) {
        #trackName { display: none; }
        #vol { display: none; }
        #transport { bottom: 14px; padding: 10px 14px 9px; }
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>

    <div id="landing">
      <div class="landing-rule"></div>
      <h1>Inside <em>the</em> Orchestra</h1>
      <p class="tagline">Stand at the podium. Every voice in the music becomes a body of living light in the hall around you.</p>
      <div id="dropzone" role="button" tabindex="0" aria-label="Choose an audio file">
        <div class="dz-main">Drop a recording here</div>
        <div class="dz-sub smallcaps">mp3 · flac · wav · ogg — or click to browse</div>
      </div>
      <button id="demoBtn" class="smallcaps">Or play the demo piece</button>
      <div class="privacy">Decoded locally — nothing leaves this page</div>
    </div>

    <div id="dragveil">release to listen</div>

    <div id="transport">
      <div class="row">
        <div id="trackName"></div>
        <div class="t-controls">
          <select id="modeSelect" aria-label="Visualization mode"></select>
        </div>
      </div>
      <div class="row">
        <button id="playBtn" aria-label="Play or pause">
          <svg viewBox="0 0 16 16"><path d="M3 1.5 L14 8 L3 14.5 Z"/></svg>
        </button>
        <span class="timecode" id="timeNow">0:00</span>
        <div id="seek"><div class="track"><div class="fill"></div><div class="knob"></div></div></div>
        <span class="timecode" id="timeTotal">0:00</span>
        <div class="t-controls">
          <input type="range" id="vol" min="0" max="1" step="0.01" value="0.9" aria-label="Volume" />
          <button id="fsBtn" aria-label="Fullscreen">
            <svg viewBox="0 0 16 16"><path d="M2 6 V2 H6 M10 2 H14 V6 M14 10 V14 H10 M6 14 H2 V10"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div id="devOverlay"></div>
    <div id="toast"></div>

    <input type="file" id="fileInput" accept="audio/*,.flac" hidden />
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
